name: Runner CD

on:
  workflow_dispatch:
  push:
    paths:
    - releaseVersion

jobs:
  check:
    if: startsWith(github.ref, 'refs/heads/releases/') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    # Make sure ./releaseVersion match ./src/runnerversion
    # Query GitHub release ensure version is not used
    - name: Check version
      uses: actions/github-script@v8
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs');
          const runnerVersion = fs.readFileSync('${{ github.workspace }}/src/runnerversion', 'utf8').replace(/\n$/g, '')
          const releaseVersion = fs.readFileSync('${{ github.workspace }}/releaseVersion', 'utf8').replace(/\n$/g, '')
          if (runnerVersion != releaseVersion) {
            console.log('Request Release Version: ' + releaseVersion + '\nCurrent Runner Version: ' + runnerVersion)
            core.setFailed('Version mismatch! Make sure ./releaseVersion match ./src/runnerVersion')
            return
          }
          try {
            const release = await github.rest.repos.getReleaseByTag({
              owner: '${{ github.event.repository.owner.name }}',
              repo: '${{ github.event.repository.name }}',
              tag: 'v' + runnerVersion
            })
            core.setFailed('Release with same tag already created: ' + release.data.html_url)
          } catch (e) {
            // We are good to create the release if release with same tag doesn't exists
            if (e.status != 404) {
              throw e
            }
          }

  build:
    needs: check
    strategy:
      matrix:
        runtime: [ win-x64, win-arm64 ]
        include:
        - runtime: win-x64
          os: windows-latest
          devScript: ./dev

        - runtime: win-arm64
          os: windows-latest
          devScript: ./dev

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6

    # Build runner layout
    - name: Build & Layout Release
      run: |
        ${{ matrix.devScript }} layout Release ${{ matrix.runtime }}
      working-directory: src

    # Create runner package tar.gz/zip
    - name: Package Release
      if: github.event_name != 'pull_request'
      run: |
        ${{ matrix.devScript }} package Release ${{ matrix.runtime }}
      working-directory: src

    # Compute SHA256 hash
    - name: Compute SHA256
      id: sha
      if: github.event_name != 'pull_request'
      shell: pwsh
      run: |
        $hash = (Get-FileHash -Path "_package\actions-runner-${{ matrix.runtime }}-*.zip" -Algorithm SHA256).Hash.ToLower()
        echo "hash=$hash" >> $env:GITHUB_OUTPUT
        echo "SHA256 for ${{ matrix.runtime }}: $hash"

    # Upload runner package tar.gz/zip as artifact.
    - name: Publish Artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v6
      with:
        name: runner-packages-${{ matrix.runtime }}
        path: |
          _package

    # Upload SHA256 as artifact
    - name: Upload SHA256
      if: github.event_name != 'pull_request'
      shell: pwsh
      run: |
        $hash = "${{ steps.sha.outputs.hash }}"
        $hash | Out-File -FilePath "${{ matrix.runtime }}.sha256" -NoNewline
        
    - name: Publish SHA Artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v6
      with:
        name: sha-${{ matrix.runtime }}
        path: ${{ matrix.runtime }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v6

    # Download SHA256 files
    - name: Download SHA (win-x64)
      uses: actions/download-artifact@v7
      with:
        name: sha-win-x64
        path: ./sha
    - name: Download SHA (win-arm64)
      uses: actions/download-artifact@v7
      with:
        name: sha-win-arm64
        path: ./sha

    # Download runner package tar.gz/zip produced by 'build' job
    - name: Download Artifact (win-x64)
      uses: actions/download-artifact@v7
      with:
        name: runner-packages-win-x64
        path: ./
    - name: Download Artifact (win-arm64)
      uses: actions/download-artifact@v7
      with:
        name: runner-packages-win-arm64
        path: ./

    # Create ReleaseNote file
    - name: Create ReleaseNote
      id: releaseNote
      uses: actions/github-script@v8
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs');
          const runnerVersion = fs.readFileSync('${{ github.workspace }}/src/runnerversion', 'utf8').replace(/\n$/g, '')
          const winx64sha = fs.readFileSync('${{ github.workspace }}/sha/win-x64.sha256', 'utf8').trim()
          const winarm64sha = fs.readFileSync('${{ github.workspace }}/sha/win-arm64.sha256', 'utf8').trim()
          var releaseNote = fs.readFileSync('${{ github.workspace }}/releaseNote.md', 'utf8').replace(/<RUNNER_VERSION>/g, runnerVersion)
          releaseNote = releaseNote.replace(/<WIN_X64_SHA>/g, winx64sha)
          releaseNote = releaseNote.replace(/<WIN_ARM64_SHA>/g, winarm64sha)
          console.log(releaseNote)
          core.setOutput('version', runnerVersion);
          core.setOutput('note', releaseNote);
          core.setOutput('win-x64-sha', winx64sha);
          core.setOutput('win-arm64-sha', winarm64sha);

    - name: Validate Packages HASH
      run: |
        ls -l
        echo "${{ steps.releaseNote.outputs.win-x64-sha }}  actions-runner-win-x64-${{ steps.releaseNote.outputs.version }}.zip" | shasum -a 256 -c
        echo "${{ steps.releaseNote.outputs.win-arm64-sha }}  actions-runner-win-arm64-${{ steps.releaseNote.outputs.version }}.zip" | shasum -a 256 -c

    # Create GitHub release using gh CLI
    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "v${{ steps.releaseNote.outputs.version }}" \
          actions-runner-win-x64-${{ steps.releaseNote.outputs.version }}.zip \
          actions-runner-win-arm64-${{ steps.releaseNote.outputs.version }}.zip \
          --title "v${{ steps.releaseNote.outputs.version }}" \
          --notes "${{ steps.releaseNote.outputs.note }}"

  publish-image:
    needs: release
    strategy:
      matrix:
        platform: [ windows/amd64, windows/arm64 ]
        include:
        - platform: windows/amd64
          os: windows-latest
          arch: amd64
        - platform: windows/arm64
          os: windows-latest
          arch: arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/actions-runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute image version
        id: image
        shell: pwsh
        run: |
          $version = Get-Content "releaseVersion" -Raw
          $version = $version.Trim()
          Write-Host "Using runner version $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        shell: pwsh
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.version }}-${{ matrix.arch }} `
            --build-arg TARGETARCH=${{ matrix.arch }} `
            --build-arg RUNNER_VERSION=${{ steps.image.outputs.version }} `
            --label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} `
            --label org.opencontainers.image.licenses=MIT `
            --label org.opencontainers.image.description="Windows Container runner for GitHub Actions based on actions/runner v${{ steps.image.outputs.version }}" `
            ./images
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.version }}-${{ matrix.arch }}
          
          # Also tag as latest for this arch
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.version }}-${{ matrix.arch }} `
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
